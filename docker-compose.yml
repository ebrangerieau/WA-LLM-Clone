services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mia-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      FRONTEND_URL: "https://mia.bandtrack.fr"
      DATABASE_URL: "sqlite:////app/data/mia.db"
    volumes:
      - sqlite_data:/app/data
      - chroma_data:/app/chroma_data
      - huggingface_cache:/root/.cache/huggingface
    networks:
      - wa-network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.wa-backend.rule=Host(`mia.bandtrack.fr`) && PathPrefix(`/api`)"
      - "traefik.http.routers.wa-backend.entrypoints=websecure"
      - "traefik.http.routers.wa-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.wa-backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://mia.bandtrack.fr
    container_name: mia-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: "https://mia.bandtrack.fr"
    depends_on:
      - backend
    networks:
      - wa-network
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.wa-frontend.rule=Host(`mia.bandtrack.fr`)"
      - "traefik.http.routers.wa-frontend.entrypoints=websecure"
      - "traefik.http.routers.wa-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.wa-frontend.loadbalancer.server.port=3000"

volumes:
  sqlite_data:
  chroma_data:
  huggingface_cache:

networks:
  wa-network:
    driver: bridge
  web:
    external: true
